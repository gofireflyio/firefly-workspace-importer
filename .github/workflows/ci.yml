name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-script:
    name: Python syntax + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile-check
        run: python -m py_compile firefly-workspace-importer.py

      - name: Help smoke test
        run: python firefly-workspace-importer.py --help

  lint-dockerfile:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

  build-image:
    name: Build container image
    runs-on: ubuntu-latest
    needs: [lint-script, lint-dockerfile]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: firefly-workspace-importer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Help smoke test inside container
        run: docker run --rm firefly-workspace-importer:ci --help
